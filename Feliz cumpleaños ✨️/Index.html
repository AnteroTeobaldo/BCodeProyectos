<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>¡Feliz Cumpleaños!</title>
                <style>
                        /* --- Estilos Generales y Fondo (Mantenemos Tonos Grises/Azules Oscuros) --- */
                                body {
                                            margin: 0;
                                                        padding: 0;
                                                                    display: flex;
                                                                                justify-content: center;
                                                                                            align-items: center;
                                                                                                        min-height: 100vh;
                                                                                                                    /* Fondo degradado radial de gris oscuro a casi negro azulado */
                                                                                                                                background: radial-gradient(circle, #334155, #0f172a);
                                                                                                                                            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                                                                                                                                                        overflow: hidden; /* Importante para que los globos no creen barras de desplazamiento */
                                                                                                                                                                    color: #f1f5f9; /* Gris muy claro para el texto general */
                                                                                                                                                                            }

                                                                                                                                                                                    /* --- Contenedor Principal de la Tarjeta (Mantenemos Tonos Grises/Azules) --- */
                                                                                                                                                                                            .card {
                                                                                                                                                                                                        background: rgba(255, 255, 255, 0.08); /* Ligeramente más opaco para contraste */
                                                                                                                                                                                                                    padding: 40px;
                                                                                                                                                                                                                                border-radius: 20px;
                                                                                                                                                                                                                                            text-align: center;
                                                                                                                                                                                                                                                        backdrop-filter: blur(15px); /* Mantenemos el desenfoque SOLO en la tarjeta */
                                                                                                                                                                                                                                                                    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
                                                                                                                                                                                                                                                                                border: 1px solid rgba(148, 163, 184, 0.3); /* Borde gris azulado */
                                                                                                                                                                                                                                                                                            position: relative;
                                                                                                                                                                                                                                                                                                        z-index: 10; /* Asegura que la tarjeta esté por encima de los globos */
                                                                                                                                                                                                                                                                                                                    /* Animación de entrada */
                                                                                                                                                                                                                                                                                                                                animation: fadeInScale 1.2s ease-out forwards;
                                                                                                                                                                                                                                                                                                                                            opacity: 0;
                                                                                                                                                                                                                                                                                                                                                        transform: scale(0.6);
                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                        /* --- Título: ¡Feliz Cumpleaños! (Mantenemos Gradiente Azul/Plata) --- */
                                                                                                                                                                                                                                                                                                                                                                                .card h1 {
                                                                                                                                                                                                                                                                                                                                                                                            font-size: 3.8rem;
                                                                                                                                                                                                                                                                                                                                                                                                        margin: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                    background: linear-gradient(70deg, #93c5fd, #f8fafc, #93c5fd, #60a5fa, #f8fafc);
                                                                                                                                                                                                                                                                                                                                                                                                                                background-size: 200% auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                            -webkit-background-clip: text;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        -webkit-text-fill-color: transparent;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    animation: shine 4s linear infinite;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* --- Subtítulo y Mensaje --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .card p {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: 1.2rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin-top: 15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: #cbd5e1; /* Gris medio */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* --- El Pastel (Mantenemos Azul y Gris Plateado) --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .cake {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                height: 60px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: #475569; /* Gris azulado base */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 10px 10px 0 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                margin: 60px auto 10px auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            box-shadow: 0 4px #334155;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .cake:before { /* Glaseado (Gris muy claro/Plata) */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                content: "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        width: 110px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    height: 25px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: #e2e8f0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        top: -15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    left: -5px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* --- La Vela (Azul) --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .candle {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                height: 35px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: repeating-linear-gradient(45deg, #2563eb, #2563eb 3px, #93c5fd 3px, #93c5fd 6px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    top: -45px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                left: 45px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 2px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* --- La Llama --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .flame {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                width: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            height: 18px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        background: #fef3c7; /* Amarillo muy pálido */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            top: -18px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        left: -1px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    box-shadow: 0 0 10px #bfdbfe, 0 0 20px #60a5fa;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                animation: flicker 1s infinite alternate;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* ========================================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        /* --- CAMBIO: GLOBOS DE COLORES Y NÍTIDOS --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* ========================================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .balloon {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 80px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                height: 100px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 50%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    bottom: -150px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* ELIMINADO: backdrop-filter: blur() y opacity baja */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            opacity: 1; /* Completamente opacos */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        animation: floatUp 10s linear infinite;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* Un sutil sombreado interno para dar volumen sin perder nitidez */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                box-shadow: inset -8px -10px 15px rgba(0,0,0,0.15);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* Hilo del globo (ahora más visible) */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .balloon::after {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    content: "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            width: 2px; /* Un poco más grueso */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        height: 80px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: rgba(255, 255, 255, 0.5); /* Más visible contra el fondo oscuro */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                top: 100px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            left: 39px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* NUEVOS COLORES VIVOS Y POSICIONES ALEATORIAS */
