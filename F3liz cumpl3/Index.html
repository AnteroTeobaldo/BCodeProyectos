<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>¡Feliz Cumpleaños!</title>
                <style>
                        /* --- Estilos Generales y Fondo (Tonos Grises/Azules Oscuros) --- */
                                body {
                                            margin: 0;
                                                        padding: 0;
                                                                    display: flex;
                                                                                justify-content: center;
                                                                                            align-items: center;
                                                                                                        min-height: 100vh;
                                                                                                                    /* Fondo degradado radial de gris oscuro a casi negro azulado */
                                                                                                                                background: radial-gradient(circle, #334155, #0f172a);
                                                                                                                                            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                                                                                                                                                        overflow: hidden; /* Importante para que los globos no creen barras de desplazamiento */
                                                                                                                                                                    color: #f1f5f9; /* Gris muy claro para el texto general */
                                                                                                                                                                            }

                                                                                                                                                                                    /* --- Contenedor Principal de la Tarjeta (Elegante) --- */
                                                                                                                                                                                            .card {
                                                                                                                                                                                                        background: rgba(255, 255, 255, 0.08); 
                                                                                                                                                                                                                    padding: 40px;
                                                                                                                                                                                                                                border-radius: 20px;
                                                                                                                                                                                                                                            text-align: center;
                                                                                                                                                                                                                                                        backdrop-filter: blur(15px); /* Desenfoque SOLO en la tarjeta */
                                                                                                                                                                                                                                                                    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
                                                                                                                                                                                                                                                                                border: 1px solid rgba(148, 163, 184, 0.3); /* Borde gris azulado */
                                                                                                                                                                                                                                                                                            position: relative;
                                                                                                                                                                                                                                                                                                        z-index: 10; /* Asegura que la tarjeta esté por encima de los globos */
                                                                                                                                                                                                                                                                                                                    /* Animación de entrada */
                                                                                                                                                                                                                                                                                                                                animation: fadeInScale 1.2s ease-out forwards;
                                                                                                                                                                                                                                                                                                                                            opacity: 0;
                                                                                                                                                                                                                                                                                                                                                        transform: scale(0.6);
                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                        /* --- Título: ¡Feliz Cumpleaños! (Gradiente Azul/Plata) --- */
                                                                                                                                                                                                                                                                                                                                                                                .card h1 {
                                                                                                                                                                                                                                                                                                                                                                                            font-size: 3.8rem;
                                                                                                                                                                                                                                                                                                                                                                                                        margin: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                    background: linear-gradient(70deg, #93c5fd, #f8fafc, #93c5fd, #60a5fa, #f8fafc);
                                                                                                                                                                                                                                                                                                                                                                                                                                background-size: 200% auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                            -webkit-background-clip: text;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        -webkit-text-fill-color: transparent;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    animation: shine 4s linear infinite;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* --- Subtítulo y Mensaje --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .card p {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: 1.2rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin-top: 15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: #cbd5e1; /* Gris medio */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* ========================================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        /* --- NUEVO: EL PASTEL COLORIDO --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* ========================================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .cake-container {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                width: 120px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            height: 100px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        margin: 60px auto 10px auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .cake {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                height: 70px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: linear-gradient(to bottom, #ff9ff3, #feca57, #48dbfb); /* Capas de colores */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        border-radius: 10px 10px 0 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                bottom: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            left: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        box-shadow: 0 4px rgba(0,0,0,0.2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    overflow: hidden;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* Chispas de colores (confeti) en el pastel */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .cake::after {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                content: "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    height: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background-image: 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                radial-gradient(#ff6b6b 2px, transparent 2px),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                radial-gradient(#1dd1a1 2px, transparent 2px),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                radial-gradient(#ff9f43 2px, transparent 2px),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                radial-gradient(#54a0ff 2px, transparent 2px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            background-size: 15px 15px, 20px 20px, 18px 18px, 22px 22px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        background-position: 0 0, 5px 5px, 10px 10px, 15px 15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    opacity: 0.8;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .iceing { /* Glaseado blanco arriba */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                content: "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        width: 110px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    height: 25px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: #ffffff;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        top: -15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    left: -5px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            z-index: 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* ========================================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* --- NUEVO: VELA ANIMADA (BALANCEO) --- */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            /* ========================================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .candle-wrapper {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            top: -45px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        left: 50px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                height: 50px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transform-origin: bottom center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        /* ANIMACIÓN DE BALANCEO DE LA VELA */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    animation: candleSway 3s ease-in-out infinite;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                z-index: 3;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .candle {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            width: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        height: 35px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: repeating-linear-gradient(45deg, #ee5253, #ee5253 3px, #f1f2f6 3px, #f1f2f6 6px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            bottom: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        left: 5px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 2px;
